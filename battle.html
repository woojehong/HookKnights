<style>
 *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
 html,body{width:100%;height:100%;background:#05070f;font-family:'Pretendard',sans-serif;color:#e8ecf7;overflow:hidden;}
 #app{position:fixed;inset:0;display:flex;flex-direction:column;}
 #topbar{height:46px;display:flex;align-items:center;gap:8px;padding:0 12px;background:#0a0e1d;border-bottom:1px solid #1b2138;font-size:13px;flex:0 0 auto;}
 .pill{background:#141a30;border-radius:9px;padding:4px 11px;display:flex;align-items:center;gap:6px;}
 .nexus{color:#8fdcff;}.nexus b{color:#c6f1ff;font-size:16px;}.dp{color:#ffd36b;}.dp b{color:#ffe08a;font-size:19px;}
 .wave{color:#9fb0d6;margin-left:auto;font-size:12px;}.abtn{border:none;color:#9be29b;font-family:'Pretendard';font-weight:600;}

 canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;}

 .card.sel{border-color:#ffd36b;box-shadow:0 0 0 2px rgba(255,211,107,.35);}.card.dis{opacity:.4;}.card.out{filter:grayscale(1) brightness(.55);}
 .card.out::after{content:"출격중";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#fff;background:#0007;border-radius:12px;}

 .card.rR{border-color:#5b8cff;}
 @keyframes rdy{0%,100%{box-shadow:0 0 0 0 rgba(255,211,107,0);}50%{box-shadow:0 0 9px 2px rgba(255,211,107,.55);}}
 .card.ready{animation:rdy 1.4s ease-in-out infinite;border-color:#ffd36b99;}

 .b-ok{background:#ffd36b;}.b-no{background:#39425f;color:#dde;}

 #overlay h1{font-family:'Do Hyeon';font-size:44px;}#overlay button{font-family:'Pretendard';font-size:16px;border:none;border-radius:12px;padding:12px 26px;background:#ffd36b;color:#0a0e1d;font-weight:600;}
 #rotate{position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;background:#05070f;z-index:9;text-align:center;padding:30px;}#rotate .ic{font-size:50px;}
 #unitpanel{position:absolute;display:none;flex-direction:column;gap:5px;background:#0c1126ee;border:1px solid #2a3454;border-radius:12px;padding:9px;z-index:4;width:150px;}
 #unitpanel .row{display:flex;gap:5px;}#unitpanel button{flex:1;font-family:'Pretendard';font-size:12px;border:none;border-radius:8px;padding:6px 0;font-weight:600;color:#0a0e1d;}
 .u-skill{background:#7fd1ff;}.u-auto{background:#9be29b;}.u-retreat{background:#ff8a8a;}

#dpFoot{font-size:13px;color:#ffd36b;margin:0 0 5px 2px;} #dpFoot b{font-size:20px;color:#ffe08a;}
#pausemenu{position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:#05070fdd;z-index:7;} #pausemenu h1{font-family:'Do Hyeon';font-size:40px;} #pausemenu button{font-family:'Pretendard';font-size:16px;border:none;border-radius:12px;padding:12px 30px;font-weight:600;width:200px;} .b-resume{background:#9be29b;color:#0a0e1d;} .b-forfeit{background:#ff8a8a;color:#0a0e1d;}
@media (pointer:coarse){
 #topbar{height:40px;font-size:12px;} #topbar .pill{padding:3px 9px;} .nexus b{font-size:14px;} .dp b{font-size:16px;}
 #hud{padding:4px 6px;}
 #dpFoot{font-size:11px;margin:0 0 3px 2px;} #dpFoot b{font-size:16px;}
 #bar{gap:6px;}
 .card{width:54px;padding:3px;border-radius:9px;}
 .card img{width:48px;height:60px;object-fit:cover;object-position:50% 10%;border-radius:6px;}
 .card .nm{font-size:11px;margin-top:2px;} .card .cost{font-size:12px;}
 .card .lv{font-size:10px;top:2px;left:3px;padding:0 4px;}
 .card.out::after{font-size:11px;border-radius:9px;}
}

<div id="app">
 <div id="topbar"><div class="pill nexus"><span>넥서스</span><b id="nexusHp">10 / 10</b></div><div class="pill dp"><span>DP</span><b id="dpVal">0</b></div><button class="pill abtn" id="autoBtn">오토 ON</button><button class="pill abtn" id="pauseBtn" style="color:#cdd;">⏸</button><div class="pill wave" id="waveInfo">웨이브</div></div>
 <div id="stage"><canvas id="game"></canvas>
  <div class="btnrow" id="confirmRow" style="display:none;"><button class="b-ok" id="btnConfirm">배치 확정</button><button class="b-no" id="btnCancel">취소</button></div>

 </div>
 <div id="hud"><div id="dpFoot">DP <b id="dpFootVal">0</b></div><div id="bar"></div></div>
</div>
<script>
"use strict";
const HEROES=[
 {id:"gubman",name:"겁만",cls:"Tank",atkType:"AD",sprite:"assets/units/Gubman.png",hp:1900,atk:80,armor:140,mr:30,range:1.6,atkInt:1.3,block:2,cost:16,spMax:24,active:"gubman"},
 {id:"dongguo",name:"동궈",cls:"Vanguard",atkType:"AD",sprite:"assets/units/Dongguo.png",hp:950,atk:70,armor:60,mr:20,range:1.6,atkInt:1.1,block:1,cost:8,spMax:12,active:"dongguo"},
 {id:"jungle",name:"정글",cls:"Melee",atkType:"AD",sprite:"assets/units/Jungle.png",hp:1150,atk:135,armor:70,mr:30,range:1.6,atkInt:1.2,block:1,cost:14,spMax:26,active:"jungle"},
 {id:"jagoro",name:"자고로",cls:"Ranged",atkType:"AD",sprite:"assets/units/Jagoro.png",hp:620,atk:90,armor:25,mr:0,range:3.2,atkInt:0.85,block:1,cost:13,spMax:20,active:"jagoro"},
 {id:"bossam",name:"보쌈",cls:"Ranged",atkType:"AP",sprite:"assets/units/Bossam.png",hp:560,atk:100,armor:20,mr:0,range:3.3,atkInt:1.6,block:1,cost:14,spMax:22,active:"bossam"},
 {id:"hooje",name:"후제",cls:"Ranged",atkType:"AP",sprite:"assets/units/Hooje.png",hp:540,atk:55,armor:15,mr:0,range:3.3,atkInt:1.5,block:1,cost:15,spMax:28,active:"hooje"},
 {id:"leeyonce",name:"리용세",cls:"Support",atkType:"AP",sprite:"assets/units/Leeyonce.png",hp:660,atk:60,armor:20,mr:30,range:3.1,atkInt:1.4,block:1,cost:12,spMax:24,active:"leeyonce"},
];
const HMAP={};HEROES.forEach(h=>HMAP[h.id]=h);
const MELEE_CLS={Tank:1,Melee:1,Vanguard:1};
const SKILL_NAME={dongguo:"형들 빨리 와요!",gubman:"방패 올리기",jagoro:"속사",bossam:"눈보라",hooje:"부패의 씨앗",jungle:"죽음의 손아귀",leeyonce:"정신의 고리 토템"};
const ENEMIES={
 slime_normal:{name:"슬라임",hp:340,atk:55,armor:25,mr:0,spd:0.85,atkInt:1.0,leak:1,sprite:"assets/Enemy/slime_normal.png",sc:1.0},
 slime_fast:{name:"날쌘 슬라임",hp:200,atk:35,armor:8,mr:0,spd:1.7,atkInt:0.8,leak:2,sprite:"assets/Enemy/slime_fast.png",sc:0.85},
 slime_heavy:{name:"묵직 슬라임",hp:900,atk:90,armor:70,mr:20,spd:0.6,atkInt:1.3,leak:3,sprite:"assets/Enemy/slime_heavy.png",sc:1.1},
 slime_boss:{name:"보스 슬라임",hp:2600,atk:150,armor:80,mr:40,spd:0.5,atkInt:1.4,leak:5,sprite:"assets/Enemy/slime_boss.png",sc:1.4},
};
const WAVES=[{at:2,type:"slime_normal",count:3,gap:1.6},{at:10,type:"slime_fast",count:4,gap:0.8},{at:18,type:"slime_normal",count:3,gap:1.2},{at:26,type:"slime_heavy",count:2,gap:2.0},{at:34,type:"slime_fast",count:5,gap:0.6},{at:40,type:"slime_boss",count:1,gap:1}];
/* ==== map (drawn by us; image-pixel grid, perfectly aligned) ==== */
const GRID={ox:64,oy:64,tile:96,cols:5,rows:10,iw:608,ih:1088};
const NEXUS=[[2,9]];
const HIGH=(function(){const a=[];for(let r=1;r<=8;r++){a.push([1,r]);a.push([3,r]);}return a;})();
const VOID=(function(){const a=[];for(let r=0;r<=9;r++){a.push([0,r]);a.push([4,r]);}return a;})();
const SPAWN=[2,0];
const START_DP=20,DP_REGEN=1.0,NEXUS_HP=10;
function key(c,r){return c+","+r;}
const NEXSET=new Set(NEXUS.map(p=>key(p[0],p[1]))), HIGHSET=new Set(HIGH.map(p=>key(p[0],p[1]))), VOIDSET=new Set(VOID.map(p=>key(p[0],p[1])));
function isField(c,r){return c>=0&&c<GRID.cols&&r>=0&&r<GRID.rows;}
function isNexus(c,r){return NEXSET.has(key(c,r));}
function isHigh(c,r){return HIGHSET.has(key(c,r));}
function isVoid(c,r){return VOIDSET.has(key(c,r));}
function isGround(c,r){return isField(c,r)&&!isNexus(c,r)&&!isHigh(c,r)&&!isVoid(c,r);}
function isDeployable(c,r){return isField(c,r)&&!isNexus(c,r)&&!isVoid(c,r);}
function dmgAfter(am,t,ar,mr){if(t==="AD")return Math.max(am-ar,am*0.05);if(t==="AP")return Math.max(am*(1-Math.min(mr,80)/100),am*0.05);const ad=Math.max(am*0.5-ar,am*0.5*0.05),ap=Math.max(am*0.5*(1-Math.min(mr,80)/100),am*0.5*0.05);return ad+ap;}
/* BFS shortest route over walkable(ground) cells to a cell adjacent to nexus */
function bfsRoute(start){
 const goalAdj=new Set();
 for(const [nc,nr] of NEXUS){for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){const c=nc+dx,r=nr+dy;if(isGround(c,r))goalAdj.add(key(c,r));}}
 const q=[start],prev={};prev[key(start[0],start[1])]=null;let goal=null;
 while(q.length){const [c,r]=q.shift();if(goalAdj.has(key(c,r))){goal=[c,r];break;}
  for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){const nc=c+dx,nr=r+dy;if(isGround(nc,nr)&&!(key(nc,nr) in prev)){prev[key(nc,nr)]=[c,r];q.push([nc,nr]);}}}
 if(!goal)return [start];
 const path=[];let cur=goal;while(cur){path.unshift(cur);cur=prev[key(cur[0],cur[1])];}
 // append the nexus cell at end so enemy walks into it
 const last=path[path.length-1]; for(const [nc,nr] of NEXUS){if(Math.abs(nc-last[0])+Math.abs(nr-last[1])===1){path.push([nc,nr]);break;}}
 return path;
}
let ROUTE=[];

const cv=document.getElementById("game"),ctx=cv.getContext("2d");
let CW=0,CH=0,DPR=1,bgX=0,bgY=0,sc=1,cw=0,ch=0,portrait=false;
const MAP=new Image();MAP.src="assets/maps/map_drawn.png";
function resize(){const st=document.getElementById("stage");const w=st.clientWidth,h=st.clientHeight;DPR=Math.min(window.devicePixelRatio||1,2);cv.width=w*DPR;cv.height=h*DPR;CW=w;CH=h;ctx.setTransform(DPR,0,0,DPR,0,0);
 portrait=h>w*1.05;const iw=MAP.width||GRID.iw,ih=MAP.height||GRID.ih;sc=Math.min(w/iw,h/ih);bgX=(w-iw*sc)/2;bgY=(h-ih*sc)/2;cw=GRID.tile*sc;ch=GRID.tile*sc;
 document.getElementById("rotate").style.display="none";}
window.addEventListener("resize",resize);
function gx0(){return bgX+GRID.ox*sc;}function gy0(){return bgY+GRID.oy*sc;}
function sx(c){return gx0()+(c+0.5)*cw;}function sy(r){return gy0()+(r+0.5)*ch;}
function pickCell(px,py){return [Math.floor((px-gx0())/cw),Math.floor((py-gy0())/ch)];}

let G;
function newGame(){G={time:0,dp:START_DP,nexus:NEXUS_HP,maxnexus:NEXUS_HP,units:[],enemies:[],fx:[],texts:[],shots:[],shake:0,timeScale:1,globalAuto:true,aim:null,spawns:[],over:false,win:false,paused:false,selHero:null,pending:null,selUnit:null};
 ROUTE=bfsRoute(SPAWN);
 WAVES.forEach(w=>{for(let i=0;i<w.count;i++){G.spawns.push({t:w.at+i*w.gap,type:w.type});}});G.spawns.sort((a,b)=>a.t-b.t);
 buildBar();hideConfirm();hideUnitPanel();document.getElementById("overlay").style.display="none";document.getElementById("pausemenu").style.display="none";const ab=document.getElementById("autoBtn");ab.textContent="오토 ON";ab.style.color="#9be29b";}
const IMG={};let loaded=0,total=0,startedOnce=false;
function loadImg(k,s){total++;const im=new Image();im.onload=im.onerror=()=>{loaded++;if(loaded>=total)start();};im.src=s;IMG[k]=im;}
total++;MAP.onload=MAP.onerror=()=>{loaded++;if(loaded>=total)start();};
HEROES.forEach(h=>loadImg(h.id,h.sprite));Object.keys(ENEMIES).forEach(k=>loadImg(k,ENEMIES[k].sprite));
function buildBar(){const bar=document.getElementById("bar");bar.innerHTML="";[...HEROES].sort((a,b)=>b.cost-a.cost).forEach(h=>{const d=document.createElement("div");d.className="card rR";d.dataset.id=h.id;d.innerHTML='<div class="lv">Lv1</div><img src="'+h.sprite+'"><div class="nm">'+h.cls[0]+' '+h.name+'</div><div class="cost">★'+h.cost+'</div>';d.addEventListener("click",()=>selectHero(h.id));bar.appendChild(d);});}
function refreshBar(){const dep=new Set(G.units.map(u=>u.hid));document.querySelectorAll(".card").forEach(d=>{const h=HMAP[d.dataset.id];const out=dep.has(h.id);const af=G.dp>=h.cost;d.classList.toggle("sel",G.selHero===h.id);d.classList.toggle("out",out);d.classList.toggle("dis",!out&&!af);d.classList.toggle("ready",!out&&af&&G.selHero!==h.id);});}
function selectHero(id){if(G.over)return;if(G.units.some(u=>u.hid===id)){toast("이미 출격 중");return;}exitFocus();G.selHero=(G.selHero===id?null:id);G.pending=null;hideConfirm();refreshBar();}
function canPlace(h,c,r){if(!isDeployable(c,r))return false;if(G.units.some(u=>u.c===c&&u.r===r))return false;if(isHigh(c,r)&&MELEE_CLS[h.cls])return false;return true;}
function tryPlace(c,r){if(G.selHero==null)return;const h=HMAP[G.selHero];if(!canPlace(h,c,r)){if(isHigh(c,r)&&MELEE_CLS[h.cls])toast("근접은 고지대 불가");return;}if(G.dp<h.cost){toast("DP 부족");return;}G.pending={h,c,r};showConfirm();}
function confirmPlace(){if(!G.pending)return;const{h,c,r}=G.pending;if(G.dp<h.cost){toast("DP 부족");return;}G.dp-=h.cost;G.units.push(makeUnit(h,c,r));G.pending=null;G.selHero=null;hideConfirm();refreshBar();}
function makeUnit(h,c,r){return{hid:h.id,c,r,hp:h.hp,maxhp:h.hp,atk:h.atk,armor:h.armor,mr:h.mr,range:h.range,atkInt:h.atkInt,atkType:h.atkType,block:h.block,cls:h.cls,cd:0,sp:0,spMax:h.spMax,auto:true,blocking:[],buffs:[],anim:Math.random()*3,lunge:0,flash:0,face:1,onHill:isHigh(c,r)};}
function spawnEnemy(t){const e=ENEMIES[t];const route=ROUTE;G.enemies.push({type:t,name:e.name,hp:e.hp,maxhp:e.hp,atk:e.atk,armor:e.armor,mr:e.mr,spd:e.spd,atkInt:e.atkInt,leak:e.leak,sc:e.sc,route,pi:0,seg:0,cd:0,blockedBy:null,dots:[],flash:0,slow:0,atkAnim:0,bob:Math.random()*6});}
function ePos(e){const a=e.route[e.pi],b=e.route[Math.min(e.pi+1,e.route.length-1)];return[a[0]+(b[0]-a[0])*e.seg,a[1]+(b[1]-a[1])*e.seg];}
function update(dt){if(G.over)return;G.time+=dt;G.dp=Math.min(99,G.dp+DP_REGEN*dt);if(G.shake>0)G.shake=Math.max(0,G.shake-dt*28);
 while(G.spawns.length&&G.time>=G.spawns[0].t){const s=G.spawns.shift();spawnEnemy(s.type);}
 for(const e of G.enemies){if(e.flash>0)e.flash-=dt;if(e.atkAnim>0)e.atkAnim-=dt;e.bob+=dt*4;
  for(const d of e.dots){d.t-=dt;if(d.t<=0){d.t+=d.interval;const dd=dmgAfter(d.dmg,"AP",e.armor,e.mr);e.hp-=dd;d.ticks--;spawnText(e,Math.round(dd),"#c39bff");}}e.dots=e.dots.filter(d=>d.ticks>0);
  let bl=e.blockedBy;if(bl&&(bl.hp<=0||!G.units.includes(bl))){bl=null;e.blockedBy=null;}
  if(bl){e.cd-=dt;if(e.cd<=0){e.cd=e.atkInt;e.atkAnim=0.3;dealToUnit(bl,e.atk,"AD");spawnFx({type:"hit",x:sx(bl.c),y:sy(bl.r)-ch*0.4,color:"#ff9a9a",life:0.3});}continue;}
  let sp=e.spd*(e.slow>0?0.5:1);if(e.slow>0)e.slow-=dt;e.seg+=sp*dt;
  if(e.seg>=1){e.seg=0;e.pi++;if(e.pi>=e.route.length-1){G.nexus-=e.leak;e.hp=-1;spawnFx({type:"leak",x:sx(NEXUS[0][0]),y:sy(NEXUS[0][1])});G.shake=Math.max(G.shake,4);continue;}
   const nd=e.route[e.pi];const u=G.units.find(x=>x.c===nd[0]&&x.r===nd[1]&&!x.onHill&&x.blocking.length<x.block&&x.hp>0);if(u){u.blocking.push(e);e.blockedBy=u;e.seg=0;}}}
 G.enemies=G.enemies.filter(e=>{if(e.hp<=0){if(e.blockedBy){const i=e.blockedBy.blocking.indexOf(e);if(i>=0)e.blockedBy.blocking.splice(i,1);}return false;}return true;});
 for(const u of G.units){u.anim+=dt;if(u.lunge>0)u.lunge-=dt*3;if(u.flash>0)u.flash-=dt;u.buffs=u.buffs.filter(b=>{b.t-=dt;if(b.t<=0){b.off&&b.off(u);return false;}return true;});

function enterFocus(u){if(!G.units.includes(u))return;G.selHero=null;G.pending=null;hideConfirm();refreshBar();G.selUnit=u;G.timeScale=0.12;const a=HMAP[u.hid].active;G.aim={unit:u,await:null,shape:(a==="jungle")?"diamond":null,hint:"스킬·자동·퇴각 (빈 곳=닫기)"};showUnitPanel(u);}
function exitFocus(){if(!G)return;G.selUnit=null;G.aim=null;G.timeScale=1;hideUnitPanel();}
function handleAim(c,r){const u=G.aim.unit;if(!u||!G.units.includes(u)){exitFocus();return;}if(G.aim.await==="enemy"){let pk=null,bd=0.85;for(const e of G.enemies){const p=ePos(e);const d=Math.hypot(p[0]-c,p[1]-r);if(d<bd&&e.type!=="slime_boss"&&dia(u,e)<=7){bd=d;pk=e;}}if(pk){castActive(u,{enemy:pk});exitFocus();}else toast("범위 내 일반 적 선택");return;}if(G.aim.await==="tile"){castActive(u,{tile:{c,r}});exitFocus();return;}const u2=G.units.find(x=>x.c===c&&x.r===r);if(u2&&u2!==u)enterFocus(u2);else exitFocus();}
document.getElementById("btnConfirm").onclick=confirmPlace;
document.getElementById("btnCancel").onclick=()=>{G.pending=null;hideConfirm();};
document.getElementById("ovBtn").onclick=()=>newGame();
document.getElementById("upRetreat").onclick=()=>{if(G.selUnit){removeUnit(G.selUnit);exitFocus();}};
document.getElementById("upAuto").onclick=()=>{if(G.selUnit){G.selUnit.auto=!G.selUnit.auto;document.getElementById("upAuto").textContent=G.selUnit.auto?"자동":"수동";}};
document.getElementById("upSkill").onclick=()=>{const u=G.selUnit;if(!u)return;if(u.sp<u.spMax){toast("SP 충전 중");return;}const a=HMAP[u.hid].active;if(a==="jungle"){G.aim={unit:u,await:"enemy",shape:"diamond",hint:"끌어올 적 선택"};hideUnitPanel();}else if(a==="bossam"){G.aim={unit:u,await:"tile",shape:null,hint:"눈보라 시전 칸 선택"};hideUnitPanel();}else{castActive(u);exitFocus();}};
document.getElementById("autoBtn").onclick=()=>{G.globalAuto=!G.globalAuto;const b=document.getElementById("autoBtn");b.textContent="오토 "+(G.globalAuto?"ON":"OFF");b.style.color=G.globalAuto?"#9be29b":"#ff8a8a";};
document.getElementById("pauseBtn").onclick=()=>{if(G.over)return;G.paused=true;document.getElementById("pausemenu").style.display="flex";};
document.getElementById("resumeBtn").onclick=()=>{G.paused=false;document.getElementById("pausemenu").style.display="none";};
document.getElementById("forfeitBtn").onclick=()=>{location.href="index.html#home";};
function showConfirm(){document.getElementById("confirmRow").style.display="flex";}
function hideConfirm(){document.getElementById("confirmRow").style.display="none";}
function showUnitPanel(u){const p=document.getElementById("unitpanel");p.style.display="flex";const px=sx(u.c),py=sy(u.r);p.style.left=Math.min(CW-160,Math.max(6,px-75))+"px";p.style.top=Math.max(6,py-140)+"px";document.getElementById("upName").textContent=HMAP[u.hid].name+" · "+(SKILL_NAME[HMAP[u.hid].active]||"");document.getElementById("upAuto").textContent=u.auto?"자동":"수동";}
function hideUnitPanel(){const p=document.getElementById("unitpanel");if(p)p.style.display="none";}
let tT;function toast(m){const t=document.getElementById("toast");t.textContent=m;t.style.display="block";clearTimeout(tT);tT=setTimeout(()=>t.style.display="none",1300);}
function endGame(win){if(G.over)return;G.over=true;G.win=win;const o=document.getElementById("overlay");o.style.display="flex";document.getElementById("ovText").textContent=win?"클리어!":"패배";document.getElementById("ovText").style.color=win?"#ffd36b":"#ff6a6a";}
resize();setTimeout(()=>{if(!startedOnce)start();},3000);
</script></body></html>
