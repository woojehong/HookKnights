<!DOCTYPE html><html lang="ko"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>후크나이츠 · 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{--blue:#0070d1;--ink:#181818;--ink2:#121314;--line:rgba(229,229,229,.18);--mute:rgba(255,255,255,.55);--gold:#f5a623;}
*{box-sizing:border-box;margin:0;padding:0;font-family:'IBM Plex Sans KR',sans-serif;}
body{background:#08090b;color:#fff;min-height:100vh;}
.wrap{max-width:980px;margin:0 auto;padding:18px;}
h1{font-weight:300;font-size:26px;margin-bottom:4px;} .sub{color:var(--mute);font-size:13px;margin-bottom:18px;}
.gate{max-width:340px;margin:80px auto;background:var(--ink);border:1px solid var(--line);border-radius:16px;padding:26px;text-align:center;}
input,select{background:var(--ink2);border:1px solid var(--line);color:#fff;border-radius:8px;padding:10px 12px;font-family:inherit;font-size:14px;}
button{background:var(--blue);color:#fff;border:none;border-radius:9999px;padding:10px 18px;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;}
button.sec{background:transparent;border:1px solid var(--line);} button.danger{background:#a32d2d;} button.gold{background:var(--gold);color:#1a1205;}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.card{background:var(--ink);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;}
.bar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.ulist{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
.ucell{background:var(--ink2);border:1px solid var(--line);border-radius:10px;padding:12px;cursor:pointer;}
.ucell:hover{border-color:var(--blue);} .ucell.sel{border-color:var(--blue);box-shadow:0 0 0 2px rgba(0,112,209,.4);}
.ucell .n{font-weight:600;} .ucell .m{font-size:12px;color:var(--mute);margin-top:3px;}
.lab{font-size:12px;color:var(--mute);margin:10px 0 4px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.msg{color:#7af09a;font-size:13px;min-height:18px;margin-top:8px;}
.small{font-size:12px;color:var(--mute);}
hr{border:none;border-top:1px solid var(--line);margin:14px 0;}
</style></head><body>
<div id="gate" class="gate">
  <h1>관리자</h1><div class="sub">후크나이츠 슈퍼관리자</div>
  <input id="pw" type="password" placeholder="관리자 비밀번호" style="width:100%;margin-bottom:10px;"/>
  <button id="gateBtn" style="width:100%;">입장</button>
  <div id="gateMsg" class="msg" style="color:#ff7a7a;"></div>
</div>
<div id="app" class="wrap" style="display:none;">
  <h1>관리자 콘솔</h1><div class="sub" id="modeInfo">-</div>
  <div class="card">
    <div class="lab">전체 배포 (모든 계정)</div>
    <div class="row">
      <input id="bcTk" type="number" value="0" style="width:90px;" placeholder="뽑기권"/>
      <select id="bcHero"></select>
      <input id="bcGray" type="number" value="0" style="width:70px;" placeholder="회"/>
      <input id="bcGreen" type="number" value="0" style="width:70px;" placeholder="초"/>
      <input id="bcRed" type="number" value="0" style="width:70px;" placeholder="빨"/>
      <input id="bcOrange" type="number" value="0" style="width:70px;" placeholder="주"/>
      <button id="bcBtn" class="gold">전체 배포</button>
    </div>
    <div class="small">뽑기권/회·초·빨·주 책 수량, 영웅(선택 시 모두에게 지급).</div>
    <div id="bcMsg" class="msg"></div>
  </div>
  <div class="bar">
    <input id="search" placeholder="ID/닉네임 검색" style="flex:1;min-width:160px;"/>
    <button id="reload" class="sec">새로고침</button>
    <span class="small" id="count"></span>
  </div>
  <div id="ulist" class="ulist"></div>
  <div id="detail"></div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="js/data.js?v=28"></script>
<script src="js/firebase.js?v=28"></script>
<script>
const ADMIN_PW = "hooje0000"; // ★ 여기 비밀번호 바꾸세요
const $=s=>document.querySelector(s);
let USERS=[], SEL=null;
const cloud = !!(window.HK&&HK.db);

function heroOptions(withBlank){ let o=withBlank?'<option value="">영웅 선택</option>':''; (HK.HEROES||[]).forEach(h=>{o+='<option value="'+h.id+'">['+(h.rarity||'R')+'] '+h.name+'</option>';}); return o; }
function lAll(){ try{return JSON.parse(localStorage.getItem("hk_users")||"{}");}catch(e){return {};} }
function lSave(a){ localStorage.setItem("hk_users",JSON.stringify(a)); }

async function loadUsers(){
  USERS=[];
  if(cloud){ const snap=await HK.db.collection("users").get(); snap.forEach(d=>{ const v=d.data()||{}; USERS.push({id:d.id, pin:v.pin, save:v.save||{}}); }); }
  else { const a=lAll(); Object.keys(a).forEach(id=>USERS.push({id, pin:a[id].pin, save:a[id].save||{}})); }
  $("#modeInfo").textContent=(cloud?"클라우드(Firestore)":"로컬")+" · 계정 "+USERS.length+"개";
  renderList();
}
async function writeUser(u){
  if(cloud){ await HK.db.collection("users").doc(u.id).set({ pin:u.pin, save:u.save }, {merge:true}); }
  else { const a=lAll(); a[u.id]={pin:u.pin, save:u.save}; lSave(a); }
}
async function deleteUser(id){
  if(cloud){ await HK.db.collection("users").doc(id).delete(); }
  else { const a=lAll(); delete a[id]; lSave(a); }
}
function ownedCount(s){ return Object.keys(s.heroes||{}).filter(k=>s.heroes[k]&&s.heroes[k].owned).length; }
function renderList(){
  const q=($("#search").value||"").toLowerCase();
  const list=USERS.filter(u=>u.id.toLowerCase().includes(q)||((u.save.nickname||"").toLowerCase().includes(q)));
  $("#count").textContent=list.length+" / "+USERS.length;
  $("#ulist").innerHTML=list.map(u=>'<div class="ucell'+(SEL===u.id?' sel':'')+'" data-id="'+u.id+'"><div class="n">'+(u.save.nickname||u.id)+'</div><div class="m">@'+u.id+' · 🎟'+((u.save.inventory&&u.save.inventory.tickets)||0)+' · 영웅 '+ownedCount(u.save)+'</div></div>').join("");
  document.querySelectorAll(".ucell").forEach(c=>c.onclick=()=>{ SEL=c.dataset.id; renderList(); renderDetail(); });
}
function ginput(id,ph,w){ return '<input id="'+id+'" type="number" value="0" placeholder="'+ph+'" style="width:'+(w||70)+'px;"/>'; }
function renderDetail(){
  const u=USERS.find(x=>x.id===SEL); const d=$("#detail"); if(!u){ d.innerHTML=""; return; }
  const s=u.save, inv=s.inventory||{books:{},hero_books:{}}; const b=inv.books||{};
  d.innerHTML='<div class="card"><div class="row" style="justify-content:space-between;"><div><b style="font-size:18px;">'+(s.nickname||u.id)+'</b> <span class="small">@'+u.id+'</span></div>'+
    '<div class="small">뽑기권 🎟'+(inv.tickets||0)+' · 영웅 '+ownedCount(s)+' · 튜토리얼 '+(s.tutorial_done?"완료":"진행 "+(s.tutorial_stage||0))+'</div></div>'+
    '<hr/>'+
    '<div class="lab">뽑기권</div><div class="row">'+ginput("dTk","수량",90)+'<button id="dTkAdd">지급(+)</button><button id="dTkSet" class="sec">설정(=)</button></div>'+
    '<div class="lab">영웅 지급</div><div class="row"><select id="dHero">'+heroOptions(true)+'</select><button id="dHeroBtn">지급</button></div>'+
    '<div class="lab">경험치책 (회/초/빨/주)</div><div class="grid4">'+ginput("dGray","회")+ginput("dGreen","초")+ginput("dRed","빨")+ginput("dOrange","주")+'</div><div class="row" style="margin-top:8px;"><button id="dBookBtn">책 지급</button></div>'+
    '<div class="lab">전용북 지급</div><div class="row"><select id="dHb">'+heroOptions(true)+'</select>'+ginput("dHbN","개수")+'<button id="dHbBtn">전용북 지급</button></div>'+
    '<hr/><div class="row"><button id="dResetTut" class="sec">튜토리얼 리셋</button><button id="dDel" class="danger">계정 삭제</button></div>'+
    '<div id="dMsg" class="msg"></div></div>';
  const msg=t=>{ $("#dMsg").textContent=t; };
  $("#dTkAdd").onclick=async()=>{ inv.tickets=(inv.tickets||0)+(+$("#dTk").value||0); await writeUser(u); msg("뽑기권 지급 완료"); renderList(); renderDetail(); };
  $("#dTkSet").onclick=async()=>{ inv.tickets=(+$("#dTk").value||0); await writeUser(u); msg("뽑기권 설정 완료"); renderList(); renderDetail(); };
  $("#dHeroBtn").onclick=async()=>{ const h=$("#dHero").value; if(!h)return; s.heroes=s.heroes||{}; if(!s.heroes[h]||!s.heroes[h].owned) s.heroes[h]={owned:true,level:1,exp:0,active_lv:1,active_exp:0}; await writeUser(u); msg(h+" 지급 완료"); renderList(); renderDetail(); };
  $("#dBookBtn").onclick=async()=>{ inv.books=inv.books||{gray:0,green:0,red:0,orange:0}; ["gray","green","red","orange"].forEach(c=>{ inv.books[c]=(inv.books[c]||0)+(+$("#d"+c.charAt(0).toUpperCase()+c.slice(1)).value||0); }); await writeUser(u); msg("경험치책 지급 완료"); renderDetail(); };
  $("#dHbBtn").onclick=async()=>{ const h=$("#dHb").value, n=+$("#dHbN").value||0; if(!h||!n)return; inv.hero_books=inv.hero_books||{}; inv.hero_books[h]=(inv.hero_books[h]||0)+n; await writeUser(u); msg(h+" 전용북 +"+n); renderDetail(); };
  $("#dResetTut").onclick=async()=>{ s.tutorial_done=false; s.tutorial_stage=0; await writeUser(u); msg("튜토리얼 리셋"); renderList(); renderDetail(); };
  $("#dDel").onclick=async()=>{ if(!confirm(u.id+" 계정을 삭제할까요?"))return; await deleteUser(u.id); SEL=null; await loadUsers(); $("#detail").innerHTML=""; };
}
async function broadcast(){
  const tk=+$("#bcTk").value||0, h=$("#bcHero").value;
  const add={gray:+$("#bcGray").value||0,green:+$("#bcGreen").value||0,red:+$("#bcRed").value||0,orange:+$("#bcOrange").value||0};
  if(!confirm("전체 "+USERS.length+"개 계정에 배포할까요?"))return;
  let ok=0;
  for(const u of USERS){ const s=u.save; s.inventory=s.inventory||{tickets:0,books:{},hero_books:{}}; s.inventory.books=s.inventory.books||{gray:0,green:0,red:0,orange:0};
    if(tk) s.inventory.tickets=(s.inventory.tickets||0)+tk;
    ["gray","green","red","orange"].forEach(c=>{ if(add[c]) s.inventory.books[c]=(s.inventory.books[c]||0)+add[c]; });
    if(h){ s.heroes=s.heroes||{}; if(!s.heroes[h]||!s.heroes[h].owned) s.heroes[h]={owned:true,level:1,exp:0,active_lv:1,active_exp:0}; }
    try{ await writeUser(u); ok++; }catch(e){}
  }
  $("#bcMsg").textContent=ok+"개 계정에 배포 완료"; renderList();
}
function enter(){
  $("#bcHero").innerHTML=heroOptions(true);
  $("#gate").style.display="none"; $("#app").style.display="block";
  $("#reload").onclick=loadUsers; $("#search").oninput=renderList; $("#bcBtn").onclick=broadcast;
  loadUsers();
}
$("#gateBtn").onclick=()=>{ if($("#pw").value===ADMIN_PW) enter(); else $("#gateMsg").textContent="비밀번호가 틀렸습니다"; };
$("#pw").addEventListener("keydown",e=>{ if(e.key==="Enter")$("#gateBtn").click(); });
</script></body></html>
