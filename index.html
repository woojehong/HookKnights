<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>후크나이츠 · Hook Knights</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&family=Montserrat:wght@300&family=IBM+Plex+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
<link href="css/app.css?v=35" rel="stylesheet" />
</head>
<body>
<div id="app">

  <div id="scrIntro" class="screen on">
    <div id="introStudio" class="introBlock">
      <img class="logoH" src="assets/logo_h_glow.png" alt="Hooje Studio" />
      <div class="mark">HOOJE STUDIO</div>
    </div>
    <div id="introTitle" class="introBlock">
      <div class="ko">후크나이츠</div>
      <div class="en">HOOK KNIGHTS</div>
      <div class="tap">화면을 탭하여 시작</div>
    </div>
    <div id="introTap"></div>
  </div>

  <div id="scrAuth" class="screen">
    <div class="authCard">
      <h2>후크나이츠</h2>
      <div class="sub">ID와 PIN 4자리로 시작하세요</div>
      <div class="tabs">
        <button id="tabLogin" class="act">로그인</button>
        <button id="tabSignup">회원가입</button>
      </div>
      <div class="field"><label>ID</label><input id="fId" type="text" autocomplete="off" placeholder="아이디" /></div>
      <div class="field"><label>PIN (숫자 4자리)</label><input id="fPin" type="tel" inputmode="numeric" maxlength="4" placeholder="••••" /></div>
      <div class="field" id="nickRow" style="display:none;"><label>닉네임 (표시 이름)</label><input id="fNick" type="text" autocomplete="off" placeholder="닉네임" /></div>
      <button id="authSubmit">로그인</button>
      <div id="authMsg"></div>
      <div class="orline"><span>또는</span></div>
      <button id="guestBtn" class="guestBtn">게스트로 시작 · 튜토리얼 스킵</button>
    </div>
  </div>

  <div id="scrHome" class="screen">
    <div class="homeTop">
      <div class="ava" id="hAva">H</div>
      <div class="who"><div class="nick" id="hNick">-</div><div class="id" id="hId">-</div></div>
    </div>
    <div class="menuList">
      <button class="mbtn primary" id="primaryBtn" data-menu="tutorial">🎓 튜토리얼</button>
      <button class="mbtn row" data-menu="world"><span class="ic">🗺</span><span class="ml">월드 1</span><span class="ch">›</span></button>
      <button class="mbtn row" data-menu="gacha"><span class="ic">🎲</span><span class="ml">가챠</span><span class="ch">›</span></button>
      <button class="mbtn row" data-menu="heroes"><span class="ic">🦸</span><span class="ml">영웅 정보</span><span class="ch">›</span></button>
      <button class="mbtn row" data-menu="squad"><span class="ic">🛡</span><span class="ml">편성</span><span class="ch">›</span></button>
      <button class="mbtn row" data-menu="mail"><span class="ic">✉</span><span class="ml">우편</span><span class="ch">›</span></button>
      <button class="mbtn row" data-menu="battle"><span class="ic">⚔</span><span class="ml">테스트 전투</span><span class="ch">›</span></button>
      <button class="mbtn ghost row" data-menu="logout"><span class="ml">로그아웃</span></button>
    </div>
  </div>

  <div id="scrTut" class="screen">
    <div class="tutHead"><button id="tutBack" class="tutBack">‹ 홈</button><h2>튜토리얼</h2></div>
    <div class="tutMapWrap"><svg id="tutPath" xmlns="http://www.w3.org/2000/svg"></svg><div id="tutNodes"></div></div>
    <div class="tutFoot">반복 플레이 가능 · 재클리어 보상은 없습니다</div>
  </div>

  <div id="rewardPop">
    <div class="rwLabel">튜토리얼 보상</div>
    <div class="rwCard" id="rwCard">
      <div class="rwRarity" id="rwRarity">R</div>
      <img id="rwImg" class="rwImg" alt="">
      <div class="rwName" id="rwName"></div>
      <div class="rwRole" id="rwRole"></div>
    </div>
    <div class="rwGot" id="rwGot"></div>
    <button class="btn-primary" id="rwOk" style="min-width:170px;">확인</button>
  </div>

  <div id="scrGacha" class="screen">
    <div class="subHead"><button class="backBtn" data-back="home">‹ 홈</button><h2>가챠</h2><div class="tk" id="gcTickets">🎟 0</div></div>
    <div class="gcBanner"><img src="assets/banner/banner1.png?v=35" alt="픽업 배너"><div class="gcBadge">PICK UP</div></div>
    <div class="gcInfo">완전체 영웅 10% · 전용북 90% · 50회 천장 · 현재 R 7종</div>
    <div class="gcTk">보유 뽑기권 <b id="gcTkBig">0</b> <button id="gcPityBtn" class="pityBtn" style="display:none;">🎁 천장 보상 <b id="gcPityN">0</b></button></div>
    <div class="gcPity">천장까지 <b id="gcPity">50</b>회</div>
    <div class="gcBtns">
      <button class="btn-primary" id="gc1">1회 뽑기 · 1장</button>
      <button class="btn-primary" id="gc10">10연 뽑기 · 10장</button>
    </div>
  </div>

  <div id="gachaPop">
    <canvas id="gpFx"></canvas>
    <div id="gpOrb"></div>
    <div id="gpFlash"></div>
    <div class="gpLabel" id="gpLabel">획득</div>
    <div class="gpGrid" id="gpGrid"></div>
    <button class="btn-primary" id="gpOk" style="min-width:170px;">확인</button>
  </div>

  <div id="scrHeroes" class="screen">
    <div class="subHead"><button class="backBtn" data-back="home">‹ 홈</button><h2>영웅 정보</h2></div>
    <div class="heroGrid" id="heroGrid"></div>
  </div>

  <div id="heroDetail">
    <div class="hdCard">
      <button class="hdClose" id="hdClose">✕</button>
      <div class="hdRarity" id="hdRarity">R</div>
      <img id="hdImg" class="hdImg" alt="">
      <div class="hdName" id="hdName"></div>
      <div class="hdMeta" id="hdMeta"></div>
      <div class="hdStats" id="hdStats"></div>
      <div class="hdSkills" id="hdSkills"></div>
      <div class="hdGrow" id="hdGrow"></div>
    </div>
  </div>

  <div id="scrWorld" class="screen">
    <div class="tutHead"><button class="tutBack" data-back="home">‹ 홈</button><h2>월드 1 · 멀록 해안</h2></div>
    <div class="tutMapWrap"><svg id="wPath" xmlns="http://www.w3.org/2000/svg"></svg><div id="wNodes"></div></div>
    <div class="tutFoot">최초 클리어 보상 + 반복 보상(경험치책) · 👑 보스 · ☠ 최종</div>
  </div>

  <div id="worldRwPop">
    <div class="rwLabel" id="wrLabel">클리어 보상</div>
    <div class="wrList" id="wrList"></div>
    <button class="btn-primary" id="wrOk" style="min-width:170px;">확인</button>
  </div>

  <div id="pitySelect">
    <div class="psHead"><div class="rwLabel">천장 보상 · 영웅 선택</div><button class="hdClose" id="psClose">✕</button></div>
    <div class="heroGrid" id="psGrid"></div>
  </div>

  <div id="tipbox"></div>
  <div id="toast"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="js/data.js?v=35"></script>
<script src="js/firebase.js?v=35"></script>
<script src="js/store.js?v=35"></script>
<script src="js/ui.js?v=35"></script>
</body>
</html>
