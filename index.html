<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>후크나이츠 · Hook Knights</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&family=Montserrat:wght@300&family=IBM+Plex+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
<link href="css/app.css" rel="stylesheet" />
</head>
<body>
<div id="app">

  <div id="scrIntro" class="screen on">
    <div id="introStudio" class="introBlock">
      <img class="logoH" src="assets/logo_h_glow.png" alt="Hooje Studio" />
      <div class="mark">HOOJE STUDIO</div>
    </div>
    <div id="introTitle" class="introBlock">
      <div class="ko">후크나이츠</div>
      <div class="en">HOOK KNIGHTS</div>
      <div class="tap">화면을 탭하여 시작</div>
    </div>
    <div id="introTap"></div>
  </div>

  <div id="scrAuth" class="screen">
    <div class="authCard">
      <h2>후크나이츠</h2>
      <div class="sub">ID와 PIN 4자리로 시작하세요</div>
      <div class="tabs">
        <button id="tabLogin" class="act">로그인</button>
        <button id="tabSignup">회원가입</button>
      </div>
      <div class="field"><label>ID</label><input id="fId" type="text" autocomplete="off" placeholder="아이디" /></div>
      <div class="field"><label>PIN (숫자 4자리)</label><input id="fPin" type="tel" inputmode="numeric" maxlength="4" placeholder="••••" /></div>
      <div class="field" id="nickRow" style="display:none;"><label>닉네임 (표시 이름)</label><input id="fNick" type="text" autocomplete="off" placeholder="닉네임" /></div>
      <button id="authSubmit">로그인</button>
      <div id="authMsg"></div>
    </div>
  </div>

  <div id="scrHome" class="screen">
    <div class="homeTop">
      <div class="ava" id="hAva">H</div>
      <div class="who"><div class="nick" id="hNick">-</div><div class="id" id="hId">-</div></div>
    </div>
    <div class="curbar">
      <div class="cur"><div class="l">뽑기권</div><div class="v" id="hTickets">0</div></div>
      <div class="cur"><div class="l">보유 영웅</div><div class="v" id="hOwned">0</div></div>
      <div class="cur"><div class="l">경험치북</div><div class="v" id="hBooks">0</div></div>
    </div>
    <div class="menuGrid">
      <button class="mbtn primary" data-menu="battle">⚔ 출전</button>
      <button class="mbtn" data-menu="gacha"><span class="ic">🎲</span>가챠</button>
      <button class="mbtn" data-menu="growth"><span class="ic">📈</span>성장</button>
      <button class="mbtn" data-menu="squad"><span class="ic">🛡</span>편성</button>
      <button class="mbtn" data-menu="mail"><span class="ic">✉</span>우편</button>
      <button class="mbtn ghost" data-menu="logout">로그아웃</button>
    </div>
  </div>

  <div id="toast"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="js/data.js"></script>
<script src="js/firebase.js"></script>
<script src="js/store.js"></script>
<script src="js/ui.js"></script>
</body>
</html>
